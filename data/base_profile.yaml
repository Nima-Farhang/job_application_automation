projects:
  - name: Data Platform Demo
    type: side_project
    positioning: Reusable AWS shared data platform foundation for small and mid-sized organisations.
    summary: Designed a production-minded platform blueprint that separates shared platform infrastructure from
      product-specific data repositories.
    purpose:
      - Demonstrate platform engineering capability beyond isolated pipeline development.
      - Show how a small organisation could bootstrap secure, repeatable AWS data platform foundations.
      - Create a clear platform/product boundary for scalable data delivery.
    implemented_capabilities:
      - Terraform-based AWS platform foundation.
      - Remote Terraform state bootstrap pattern.
      - Environment-aware deployment structure for dev, test and prod.
      - Shared S3 storage zones.
      - IAM roles and policy separation.
      - Secrets Manager baseline.
      - Logging and monitoring baseline.
      - VPC networking baseline.
      - GitHub Actions deployment workflow.
      - Devcontainer-based reproducible development environment.
      - Architecture documentation and Architecture Decision Records.
    technical_stack:
      - AWS
      - Terraform
      - GitHub Actions
      - S3
      - IAM
      - Secrets Manager
      - CloudWatch/logging baseline
      - VPC networking
      - Devcontainers
      - Markdown documentation
      - Architecture Decision Records
    architecture_signals:
      - platform ownership
      - infrastructure as code
      - cloud foundation design
      - security boundary design
      - environment strategy
      - CI/CD deployment model
      - platform/product separation
      - governance through documentation
    cv_usage:
      - Use for platform engineering, data platform, cloud infrastructure and principal/staff-level roles.
      - Strongest when the job description asks for AWS, Terraform, platform foundations, cloud governance, CI/CD
        or reusable engineering standards.
      - Do not present as a production client platform; present as a side project / reference implementation.
  - name: Data Product Demo
    type: side_project
    positioning: Single-repository data product blueprint combining infrastructure, transformation, application
      and CI/CD.
    summary: Built an end-to-end data product reference implementation using Snowflake, dbt, Streamlit, Terraform
      and GitHub Actions.
    purpose:
      - Demonstrate how a focused data product can be owned and deployed from one repository.
      - Show a practical pattern for consultancy-style delivery of small and medium data products.
      - Bridge data engineering, analytics engineering, infrastructure and business-facing app delivery.
    implemented_capabilities:
      - Terraform provisioning for Snowflake database, schemas, warehouse and supporting objects.
      - dbt project with seeds, staging models, marts and tests.
      - Layered Snowflake design using RAW, STAGING, ANALYTICS and APP schemas.
      - Multiple Snowflake Streamlit applications deployed from app folders.
      - GitHub Actions workflows for Terraform, dbt and Streamlit deployment.
      - GitHub Codespaces/devcontainer setup for reproducible development.
      - Documentation covering quick start, Terraform, dbt and Streamlit workflows.
    technical_stack:
      - Snowflake
      - Terraform
      - dbt
      - SQL
      - Streamlit
      - Python
      - GitHub Actions
      - GitHub Codespaces
      - Devcontainers
    architecture_signals:
      - data product thinking
      - modern data stack
      - analytics engineering
      - self-service analytics
      - infrastructure as code
      - CI/CD for data platforms
      - business-facing data applications
      - small-team delivery pattern
    cv_usage:
      - Use for data engineering, analytics engineering, Snowflake/dbt, modern data stack and consulting-style delivery
